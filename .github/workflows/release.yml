name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Publish app (single-file, win-x64)
        shell: pwsh
        run: |
          dotnet publish src\CompanionAgent.App\CompanionAgent.App.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output publish\win-x64 `
            /p:Version=${{ steps.version.outputs.VERSION }} `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true

      - name: Copy string resources next to exe
        shell: pwsh
        run: |
          $dest = "publish\win-x64\resources\strings"
          New-Item -ItemType Directory -Force $dest | Out-Null
          Copy-Item "resources\strings\*.json" $dest

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc installer\setup.iss /DAppVersion=${{ steps.version.outputs.VERSION }}
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup failed" }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Sim Racing Companion ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/SimRacingCompanion-Setup-${{ steps.version.outputs.VERSION }}.exe
          body: |
            ## Instalação

            Baixe o arquivo `SimRacingCompanion-Setup-${{ steps.version.outputs.VERSION }}.exe` e execute.

            O instalador irá:
            - Detectar automaticamente a instalação do Assetto Corsa
            - Configurar o modo de operação (Fonte de dados ou Somente visualização)
            - Criar atalho no menu Iniciar

            Após a instalação, abra o app e faça login na aba **Configurações**.
